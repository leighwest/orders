name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw verify

  push-to-ecr:
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package jar
        run: ./mvnw package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-4

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.1.4

      - name: Build and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile.orders.prod \
            -t $REGISTRY/orders:$IMAGE_TAG \
            -t $REGISTRY/orders:latest \
            .
          docker push $REGISTRY/orders:$IMAGE_TAG
          docker push $REGISTRY/orders:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: push-to-ecr

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-4

      - name: Start EC2 instance
        run: |
          STATE=$(aws ec2 describe-instances --instance-ids ${{ secrets.INSTANCE_ID }} --query "Reservations[0].Instances[0].State.Name" --output text)
          if [ "$STATE" != "running" ]; then
            aws ec2 start-instances --instance-ids ${{ secrets.INSTANCE_ID }}
            aws ec2 wait instance-running --instance-ids ${{ secrets.INSTANCE_ID }}
            sleep 30
          fi

      - name: Copy docker-compose.prod.yaml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          use_insecure_cipher: true
          source: "docker-compose.prod.yaml,docker/,nginx/"
          target: "/home/ec2-user/"
          overwrite: true

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-4 \
              | docker login --username AWS --password-stdin \
                $(aws sts get-caller-identity --query Account --output text).dkr.ecr.ap-southeast-4.amazonaws.com
            
            REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.ap-southeast-4.amazonaws.com
            
            export MYSQL_ROOT_PASSWORD=$(aws ssm get-parameter --name orders_mysql_password --with-decryption --query Parameter.Value --output text --region ap-southeast-4)
            export MAIL_USERNAME=$(aws ssm get-parameter --name orders_ses_smtp_username --with-decryption --query Parameter.Value --output text --region ap-southeast-4)
            export MAIL_PASSWORD=$(aws ssm get-parameter --name orders_ses_smtp_password --with-decryption --query Parameter.Value --output text --region ap-southeast-4)
            export ORDERS_IMAGE=$REGISTRY/orders:latest
            
            echo "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" > /home/ec2-user/.env
            echo "MAIL_USERNAME=$MAIL_USERNAME" >> /home/ec2-user/.env
            echo "MAIL_PASSWORD=$MAIL_PASSWORD" >> /home/ec2-user/.env
            echo "ORDERS_IMAGE=$ORDERS_IMAGE" >> /home/ec2-user/.env
            
            docker-compose -f docker-compose.prod.yaml pull
            docker-compose -f docker-compose.prod.yaml up -d
            
            docker image prune -f