name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw verify

  push-to-ecr:
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package jar
        run: ./mvnw package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-4

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.1.4

      - name: Build and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile.orders.prod \
            -t $REGISTRY/orders:$IMAGE_TAG \
            -t $REGISTRY/orders:latest \
            .
          docker push $REGISTRY/orders:$IMAGE_TAG
          docker push $REGISTRY/orders:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: push-to-ecr

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-4

      - name: Look up instance ID
        id: get-instance-id
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=orders-server" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Start EC2 instance
        run: |
          STATE=$(aws ec2 describe-instances --instance-ids ${{ secrets.INSTANCE_ID }} --query "Reservations[0].Instances[0].State.Name" --output text)
          if [ "$STATE" != "running" ]; then
            aws ec2 start-instances --instance-ids ${{ secrets.INSTANCE_ID }}
            aws ec2 wait instance-running --instance-ids ${{ secrets.INSTANCE_ID }}
            sleep 30
          fi

      - name: Upload deploy files to S3
        run: |
          aws s3 cp docker-compose.prod.yaml s3://orders-deploy-artefacts/docker-compose.prod.yaml
          aws s3 cp nginx/nginx.conf s3://orders-deploy-artefacts/nginx/nginx.conf

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ steps.get-instance-id.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://orders-deploy-artefacts/docker-compose.prod.yaml /home/ec2-user/docker-compose.prod.yaml",
              "mkdir -p /home/ec2-user/nginx",
              "aws s3 cp s3://orders-deploy-artefacts/nginx/nginx.conf /home/ec2-user/nginx/nginx.conf",
              "REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.ap-southeast-4.amazonaws.com",
              "aws ecr get-login-password --region ap-southeast-4 | docker login --username AWS --password-stdin $REGISTRY",
              "export MYSQL_ROOT_PASSWORD=$(aws ssm get-parameter --name orders_mysql_password --with-decryption --query Parameter.Value --output text --region ap-southeast-4)",
              "export MAIL_USERNAME=$(aws ssm get-parameter --name orders_ses_smtp_username --with-decryption --query Parameter.Value --output text --region ap-southeast-4)",
              "export MAIL_PASSWORD=$(aws ssm get-parameter --name orders_ses_smtp_password --with-decryption --query Parameter.Value --output text --region ap-southeast-4)",
              "export ORDERS_IMAGE=$REGISTRY/orders:latest",
              "docker-compose -f /home/ec2-user/docker-compose.prod.yaml pull",
              "docker-compose -f /home/ec2-user/docker-compose.prod.yaml up -d",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
          --command-id $COMMAND_ID \
          --instance-id ${{ steps.get-instance-id.outputs.instance_id }}
          
          aws ssm get-command-invocation \
          --command-id $COMMAND_ID \
          --instance-id ${{ steps.get-instance-id.outputs.instance_id }} \
          --query "[Status, StandardOutputContent, StandardErrorContent]" \
          --output text